<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Follow-Up AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Invoice Follow-Up AI</h1>
        <p>Create professional payment reminders in seconds.</p>

        <form id="reminderForm">
            <label for="businessName">Your business name</label>
            <input type="text" id="businessName" required>

            <label for="customerName">Customer name</label>
            <input type="text" id="customerName" required>
            <label for="customerEmail">Customer email</label>
            <input
                type="email"
                id="customerEmail"
                placeholder="customer@example.com"
                required
            >
            <label for="invoiceNumber">Invoice number</label>
            <input type="text" id="invoiceNumber" required>

            <label for="amount">Amount owed</label>
            <input type="number" id="amount" min="0" step="0.01" required>

            <label for="dueDate">Due date</label>
            <input type="date" id="dueDate" required>
            <label for="paymentLink">Payment link (optional)</label>
            <input
                type="url"
                id="paymentLink"
                placeholder="https://your-payment-link.com"
            > 
            <label for="tone">Reminder tone</label>
            <select id="tone" required>
                <option value="friendly">Friendly reminder</option>
                <option value="firm">Firm reminder</option>
                <option value="final">Final notice</option>
            </select>
            <button type="submit">Generate Reminder</button>
        </form>

        <section id="resultSection" hidden>
            <h2>Your payment reminder</h2>
            <div id="reminderOutput"></div>
            <button type="button" id="copyButton">Copy Message</button>
            <button type="button" id="emailButton">Send with Email App</button>
            <button type="button" id="saveButton">Save Reminder</button>
        </section>
        <section id="historySection" class="history-section">
            <div class="history-heading">
                <h2>Saved Reminders</h2>
                <button type="button" id="clearHistoryButton">
                    Clear History
                </button>
            </div>
        
            <p id="emptyHistoryMessage">
                No reminders saved yet.
            </p>
        
            <div id="historyList"></div>
        </section>
        <section class="feedback-section">
            <p>Help us improve Invoice Follow-Up AI.</p>
            <a
                class="feedback-button"
                href="https://docs.google.com/forms/d/e/1FAIpQLSciPIqaOZWNICEapartX4webXKOMAzbdnPBFlSGGddXzPRoZQ/viewform"
                target="_blank"
                rel="noopener noreferrer"
            >
                Give Feedback
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
